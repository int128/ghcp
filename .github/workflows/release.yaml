name: release

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/release.yaml
      - pkg/**
      - '*.go'
      - go.*
    tags:
      - v*
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/release.yaml
      - pkg/**
      - '*.go'
      - go.*
  workflow_dispatch:
    inputs:
      release-name:
        description: Name to create a draft release
        type: string
        required: true

jobs:
  draft:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: write
    outputs:
      created-release-name: ${{ steps.create.outputs.created-release-name }}
    steps:
      - id: create
        uses: int128/go-release-action/create-draft-release@a66c6363c3786fda1b453243ade66b09bb5390cd # v2.2.0
        with:
          release-name: ${{ inputs.release-name || case(github.ref_type == 'tag', github.ref_name, '') }}

  build:
    needs: draft
    strategy:
      matrix:
        platform:
          - runs-on: ubuntu-latest
            GOOS: linux
            GOARCH: amd64
          - runs-on: ubuntu-latest
            GOOS: linux
            GOARCH: arm64
          - runs-on: ubuntu-latest
            GOOS: linux
            GOARCH: arm
          - runs-on: macos-latest
            GOOS: darwin
            GOARCH: amd64
          - runs-on: macos-latest
            GOOS: darwin
            GOARCH: arm64
          - runs-on: windows-latest
            GOOS: windows
            GOARCH: amd64
    runs-on: ${{ matrix.platform.runs-on }}
    env:
      GOOS: ${{ matrix.platform.GOOS }}
      GOARCH: ${{ matrix.platform.GOARCH }}
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: make
      - uses: int128/go-release-action@a66c6363c3786fda1b453243ade66b09bb5390cd # v2.2.0
        with:
          binary: ghcp
          release-name: ${{ needs.draft.outputs.created-release-name }}
