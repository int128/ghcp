name: release

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/release.yaml
      - pkg/**
      - '*.go'
      - go.*
      - Makefile
  pull_request:
    branches:
      - master
    paths:
      - .github/workflows/release.yaml
      - pkg/**
      - '*.go'
      - go.*
      - Makefile

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}--${{ github.ref }}

jobs:
  create:
    runs-on: ubuntu-slim
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - id: create
        uses: int128/go-release-action/create-draft-release@d41b0078a58c1c5360be181566937fdd79caef6e # v2.4.0
        with:
          release-name: ${{ case(github.event_name == 'push', 'next', '') }}

  build:
    needs: create
    strategy:
      matrix:
        platform:
          - runs-on: ubuntu-latest
            GOOS: linux
            GOARCH: amd64
          - runs-on: ubuntu-latest
            GOOS: linux
            GOARCH: arm64
          - runs-on: ubuntu-latest
            GOOS: linux
            GOARCH: arm
          - runs-on: macos-latest
            GOOS: darwin
            GOARCH: amd64
          - runs-on: macos-latest
            GOOS: darwin
            GOARCH: arm64
          - runs-on: windows-latest
            GOOS: windows
            GOARCH: amd64
    runs-on: ${{ matrix.platform.runs-on }}
    env:
      GOOS: ${{ matrix.platform.GOOS }}
      GOARCH: ${{ matrix.platform.GOARCH }}
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - run: make
      - uses: int128/go-release-action@d41b0078a58c1c5360be181566937fdd79caef6e # v2.4.0
        with:
          binary: ghcp
          release-name: ${{ case(github.event_name == 'push', 'next', '') }}
